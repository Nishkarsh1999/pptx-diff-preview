server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container (service name "api" in compose).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        client_max_body_size 110m;   # must exceed MAX_UPLOAD_MB
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
